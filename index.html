<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一個 AR 網頁</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; }
        model-viewer { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <model-viewer 
        src="https://pub-82dbc9529ce24d7bb90a10c5c7ff0532.r2.dev/test004.glb" 
        ios-src="https://pub-82dbc9529ce24d7bb90a10c5c7ff0532.r2.dev/test004.usdz"
        alt="我的 3D AR 模型" 
        ar 
        ar-modes="quick-look webxr" 
        camera-controls 
        touch-action="none"
        shadow-intensity="1"
        autoplay>
        
        <button slot="ar-button" style="background-color: #000000; color: white; border-radius: 30px; border: none; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 30px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; z-index: 999;">
            >> 點擊進入AR模式
        </button>
        
    </model-viewer>

</html>

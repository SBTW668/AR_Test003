<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨平台 3D AR 體驗 (test003)</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        /* 讓 3D 畫布佔滿手機整個螢幕，畫面最漂亮 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }

        /* 稍微美化一下預設的 AR 按鈕（非必要，但比較好看） */
        #ar-button {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            color: #333333;
            border: 1px solid #ccc;
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="test003.glb" 
        ios-src="test003.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        autoplay
        animation-name="*"
        alt="一個會動的 test003 AR 模型">
        
        <button slot="ar-button" id="ar-button">
            進入 AR 模式 ➔
        </button>
        
    </model-viewer>

</body>
</html>

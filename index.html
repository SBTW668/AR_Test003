<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虎鯨 AR 體驗區</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        model-viewer {
            width: 100vw;
            height: 100vh;
            --poster-color: transparent;
        }
        /* 確保 AR 按鈕不論如何都絕對不會被系統隱藏 */
        [slot="ar-button"] {
            display: block !important;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="test003.glb" 
        ios-src="test003.usdz#allowsSquareFootage=0&canonicalWebPageURL=https://google.com" 
        alt="一隻可愛的動態虎鯨" 
        autoplay
        camera-controls 
        ar 
        ar-modes="quick-look webxr scene-viewer">
        
        <button slot="ar-button" style="background-color: #007aff; color: white; border: none; border-radius: 8px; padding: 14px 28px; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 16px; font-weight: bold; box-shadow: 0 4px 16px rgba(0,0,0,0.3); cursor: pointer; z-index: 999;">
            👋 點擊進入 AR 空間
        </button>

    </model-viewer>

</body>
</html>

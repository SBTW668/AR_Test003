<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>虎鯨 AR 測試 V2</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>

        body { margin: 0; background-color: #f0f0f0; }

        model-viewer {

            width: 100vw;

            height: 100vh;

        }

    </style>

</head>

<body>



    <model-viewer 

        src="test003.glb" 

        ios-src="test003.usdz" 

        ar

        ar-modes="quick-look webxr"

        camera-controls 

        autoplay

        

        shadow-intensity="0.6" 

        shadow-softness="1"

        exposure="1.2"

        >

        

        <button slot="ar-button" style="background-color: #0066cc; color: white; border: none; padding: 14px 28px; border-radius: 30px; position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); z-index: 999;">

            🐋 讓虎鯨游進房間

        </button>

    </model-viewer>



</body>

</html>

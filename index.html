<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虎鯨 AR 測試</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; }
        model-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="test003.glb" 
        ios-src="test003.usdz" 
        ar
        ar-modes="quick-look webxr"
        camera-controls 
        autoplay
        
        shadow-intensity="1.5" 
        shadow-softness="0.4"
        exposure="1"
        >
        
        <button slot="ar-button" style="background-color: #0066cc; color: white; border: none; padding: 12px 24px; border-radius: 8px; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 16px; font-weight: bold; cursor: pointer;">
            🐋 讓虎鯨游進房間
        </button>
    </model-viewer>

</body>
</html>

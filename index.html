<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨平台 3D AR 體驗</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        /* 讓 3D 畫布佔滿手機整個螢幕 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="test003.glb" 
        ios-src="test003.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        autoplay
        animation-name="*"
        alt="我的 3D AR 模型">
    </model-viewer>

</body>
</html>

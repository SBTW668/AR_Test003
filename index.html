<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨平台 3D AR 體驗</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }

        /* 專門為 iPhone 設計的強制 AR 按鈕樣式 */
        #ios-ar-btn {
            display: none; /* 預設隱藏，由 JS 判斷是 iPhone 才顯示 */
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffffff;
            border: 1px solid #ccc;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: bold;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 9999;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="test003.glb" 
        ios-src="test003.usdz" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        autoplay
        animation-name="*">
    </model-viewer>

    <a id="ios-ar-btn" href="test003.usdz#allowsContentScaling=0" rel="ar">
        <img src="https://modelviewer.dev/assets/ic_view_in_ar_new_googblue_48dp.
